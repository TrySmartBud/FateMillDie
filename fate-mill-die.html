<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Fate Mill</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-night:#161225;
    --panel:#211c33;
    --panel-edge:#352c50;
    --parchment:#ECE3CE;
    --gold:#C9A227;
    --gold-dim:#8a712199;
    --rust:#9B4A3E;
    --grey-blank:#6b6480;
    --shadow:#0b0916;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% -10%, #2c2450 0%, var(--ink-night) 55%),
      var(--ink-night);
    color:var(--parchment);
    font-family:'Cormorant Garamond', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }
  .stage{
    width:100%;
    max-width:640px;
  }
  header{
    text-align:center;
    margin-bottom:34px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--gold-dim);
    margin:0 0 10px;
  }
  h1{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:clamp(28px, 5vw, 40px);
    letter-spacing:0.06em;
    margin:0;
    color:var(--parchment);
    text-shadow:0 0 24px rgba(201,162,39,0.25);
  }
  .subtitle{
    font-style:italic;
    color:#b8afd6;
    font-size:16px;
    margin-top:8px;
  }

  /* --- The Mill --- */
  .mill-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:28px;
    position:relative;
  }
  .mill{
    width:260px;
    height:260px;
    position:relative;
  }
  .mill svg{
    width:100%;
    height:100%;
    display:block;
    transform-origin:50% 50%;
    filter:drop-shadow(0 10px 30px rgba(0,0,0,0.55));
  }
  .mill.spinning svg{
    animation:grind 0.9s cubic-bezier(.62,.03,.38,.97);
  }
  @keyframes grind{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(720deg);}
  }

  .dice-row{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    gap:10px;
  }
  .die{
    width:46px; height:46px;
    background:linear-gradient(160deg, #2c2547, #171229);
    border:1px solid var(--panel-edge);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel', serif;
    font-size:24px;
    font-weight:700;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03), 0 4px 10px rgba(0,0,0,0.5);
    transition:transform 0.25s ease;
  }
  .die.plus{color:var(--gold); text-shadow:0 0 10px rgba(201,162,39,0.5);}
  .die.minus{color:var(--rust); text-shadow:0 0 10px rgba(155,74,62,0.5);}
  .die.blank{color:var(--grey-blank);}
  .die.rolling{ animation:tumble 0.55s ease infinite; }
  @keyframes tumble{
    0%{transform:rotate(0deg) scale(1);}
    50%{transform:rotate(180deg) scale(0.9);}
    100%{transform:rotate(360deg) scale(1);}
  }

  .result{
    text-align:center;
    margin-bottom:8px;
  }
  .result-value{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:56px;
    line-height:1;
    color:var(--parchment);
    text-shadow:0 0 30px rgba(201,162,39,0.3);
  }
  .result-value.pos{color:var(--gold);}
  .result-value.neg{color:var(--rust);}
  .result-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:#9a91bd;
    margin-top:4px;
  }

  .roll-btn{
    display:block;
    margin:26px auto 40px;
    font-family:'Cinzel', serif;
    font-size:15px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-night);
    background:linear-gradient(160deg, #dfc35a, var(--gold));
    border:none;
    padding:14px 38px;
    border-radius:999px;
    cursor:pointer;
    font-weight:700;
    box-shadow:0 8px 20px rgba(201,162,39,0.25), inset 0 1px 0 rgba(255,255,255,0.4);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .roll-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 26px rgba(201,162,39,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }
  .roll-btn:active{ transform:translateY(0); }
  .roll-btn:disabled{ opacity:0.55; cursor:default; transform:none; }
  .roll-btn:focus-visible{ outline:2px solid var(--parchment); outline-offset:3px; }

  /* --- Ledger (roll log) --- */
  .ledger{
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:10px;
    overflow:hidden;
  }
  .ledger-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
    border-bottom:1px solid var(--panel-edge);
  }
  .ledger-head h2{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:#b8afd6;
    margin:0;
    font-weight:500;
  }
  .clear-btn{
    background:none;
    border:1px solid var(--panel-edge);
    color:#9a91bd;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
  }
  .clear-btn:hover{ color:var(--parchment); border-color:#6b608f; }

  .ledger-list{
    list-style:none;
    margin:0; padding:0;
    max-height:280px;
    overflow-y:auto;
  }
  .ledger-list li{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 18px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    border-bottom:1px solid rgba(255,255,255,0.04);
    color:#c9c2e6;
  }
  .ledger-list li:last-child{ border-bottom:none; }
  .ledger-index{
    color:#6b608f;
    width:18px;
    flex-shrink:0;
  }
  .ledger-faces{
    letter-spacing:0.15em;
    color:#9a91bd;
    flex:1;
  }
  .ledger-total{
    font-weight:500;
    min-width:34px;
    text-align:right;
  }
  .ledger-total.pos{ color:var(--gold); }
  .ledger-total.neg{ color:var(--rust); }
  .ledger-empty{
    padding:24px 18px;
    text-align:center;
    font-style:italic;
    color:#6b608f;
    font-family:'Cormorant Garamond', serif;
    font-size:15px;
  }

  @media (prefers-reduced-motion: reduce){
    .mill.spinning svg{ animation:none; }
    .die.rolling{ animation:none; }
  }
</style>
</head>
<body>

<div class="stage">
  <header>
    <p class="eyebrow">Four Fudge Dice · dF</p>
    <h1>The Fate Mill</h1>
    <p class="subtitle">Turn the wheel. Let it grind out what fortune allows.</p>
  </header>

  <div class="mill-wrap">
    <div class="mill" id="mill">
      <svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
        <circle cx="130" cy="130" r="118" fill="none" stroke="#352c50" stroke-width="2"/>
        <circle cx="130" cy="130" r="100" fill="none" stroke="#2a2440" stroke-width="14"/>
        <g stroke="#C9A227" stroke-width="2" opacity="0.55">
          <line x1="130" y1="12" x2="130" y2="34"/>
          <line x1="130" y1="226" x2="130" y2="248"/>
          <line x1="12" y1="130" x2="34" y2="130"/>
          <line x1="226" y1="130" x2="248" y2="130"/>
          <line x1="46" y1="46" x2="62" y2="62"/>
          <line x1="198" y1="198" x2="214" y2="214"/>
          <line x1="46" y1="214" x2="62" y2="198"/>
          <line x1="198" y1="62" x2="214" y2="46"/>
        </g>
        <circle cx="130" cy="130" r="118" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.3"/>
      </svg>
      <div class="dice-row" id="diceRow">
        <div class="die blank">·</div>
        <div class="die blank">·</div>
        <div class="die blank">·</div>
        <div class="die blank">·</div>
      </div>
    </div>
  </div>

  <div class="result">
    <div class="result-value" id="resultValue">—</div>
    <div class="result-label" id="resultLabel">awaiting the turn</div>
  </div>

  <button class="roll-btn" id="rollBtn">Roll the Mill</button>

  <div class="ledger">
    <div class="ledger-head">
      <h2>Roll Ledger · last 10</h2>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>
    <ul class="ledger-list" id="ledgerList">
      <li class="ledger-empty" id="ledgerEmpty">No rolls yet — the wheel stands still.</li>
    </ul>
  </div>
</div>

<script>
  const FACES = [
    { sym: '+', cls: 'plus', val: 1 },
    { sym: '−', cls: 'minus', val: -1 },
    { sym: '', cls: 'blank', val: 0 }
  ];

  const mill = document.getElementById('mill');
  const diceRow = document.getElementById('diceRow');
  const rollBtn = document.getElementById('rollBtn');
  const clearBtn = document.getElementById('clearBtn');
  const resultValue = document.getElementById('resultValue');
  const resultLabel = document.getElementById('resultLabel');
  const ledgerList = document.getElementById('ledgerList');
  const ledgerEmpty = document.getElementById('ledgerEmpty');

  let history = []; // most recent first, max 10

  function rollOneDie(){
    return FACES[Math.floor(Math.random() * 3)];
  }

  function renderDice(dice, animate){
    diceRow.innerHTML = '';
    dice.forEach(d => {
      const el = document.createElement('div');
      el.className = 'die ' + d.cls + (animate ? ' rolling' : '');
      el.textContent = d.sym || '·';
      diceRow.appendChild(el);
    });
  }

  function renderResult(total){
    resultValue.textContent = (total > 0 ? '+' : '') + total;
    resultValue.className = 'result-value' + (total > 0 ? ' pos' : total < 0 ? ' neg' : '');
    const labels = {
      4:'legendary', 3:'superb', 2:'great', 1:'fair',
      0:'mediocre', '-1':'poor', '-2':'bad', '-3':'terrible', '-4':'catastrophic'
    };
    resultLabel.textContent = labels[total] || '';
  }

  function renderLedger(){
    ledgerList.innerHTML = '';
    if(history.length === 0){
      ledgerList.appendChild(ledgerEmpty);
      return;
    }
    history.forEach((entry, i) => {
      const li = document.createElement('li');
      const idx = document.createElement('span');
      idx.className = 'ledger-index';
      idx.textContent = history.length - i;
      const faces = document.createElement('span');
      faces.className = 'ledger-faces';
      faces.textContent = entry.dice.map(d => d.sym || '·').join('  ');
      const total = document.createElement('span');
      total.className = 'ledger-total' + (entry.total > 0 ? ' pos' : entry.total < 0 ? ' neg' : '');
      total.textContent = (entry.total > 0 ? '+' : '') + entry.total;
      li.appendChild(idx);
      li.appendChild(faces);
      li.appendChild(total);
      ledgerList.appendChild(li);
    });
  }

  function roll(){
    rollBtn.disabled = true;
    mill.classList.add('spinning');

    const tumbleDice = [rollOneDie(), rollOneDie(), rollOneDie(), rollOneDie()];
    renderDice(tumbleDice, true);

    setTimeout(() => {
      const finalDice = [rollOneDie(), rollOneDie(), rollOneDie(), rollOneDie()];
      const total = finalDice.reduce((sum, d) => sum + d.val, 0);

      renderDice(finalDice, false);
      renderResult(total);

      history.unshift({ dice: finalDice, total });
      if(history.length > 10) history.pop();
      renderLedger();

      mill.classList.remove('spinning');
      rollBtn.disabled = false;
    }, 850);
  }

  function clearLedger(){
    history = [];
    renderLedger();
  }

  rollBtn.addEventListener('click', roll);
  clearBtn.addEventListener('click', clearLedger);

  renderLedger();
</script>

</body>
</html>
